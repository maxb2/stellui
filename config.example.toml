# Stellui configuration
# Copy to:
#   Linux/macOS: ~/.config/stellui/config.toml
#   Windows:     %APPDATA%\stellui\config.toml

# Faintest magnitude to display (0 = brightest, 8 = very faint)
max_mag = 5.5

